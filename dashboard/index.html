<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>metra-monitor — MD-W live</title>
    <meta name="description" content="Live MD-W commute status, map, and alerts." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div class="logo">
        <span class="logo-mark">🚆</span>
        <span class="logo-text">metra-monitor</span>
        <span class="line-badge" id="line-badge">MD-W</span>
      </div>
      <div class="meta">
        <span class="last-update" id="last-update">connecting…</span>
        <span class="refresh-dot" id="refresh-dot"></span>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </header>

    <div id="feed-banner" class="feed-banner" hidden>⚠️ Feed stale — showing last known data</div>

    <div id="alerts-ticker" class="alerts-ticker" hidden></div>

    <main class="layout">
      <section class="board" id="board">
        <div class="board-row" id="row-morning" data-slot="morning">
          <div class="board-row-label">Morning <span class="board-route">Roselle ▸ Chicago</span></div>
          <div class="board-row-body">Loading…</div>
        </div>
        <div class="board-row" id="row-evening" data-slot="evening">
          <div class="board-row-label">Evening <span class="board-route">Chicago ▸ Roselle</span></div>
          <div class="board-row-body">Loading…</div>
        </div>
      </section>

      <section class="map-pane">
        <div id="map"></div>
        <aside id="sheet" class="sheet" hidden>
          <button class="sheet-close" id="sheet-close" aria-label="Close">✕</button>
          <div id="sheet-content"></div>
        </aside>
      </section>
    </main>

    <section class="trend" id="trend">
      <div class="trend-title">30-day on-time performance</div>
      <div id="trend-body" class="trend-body">Loading…</div>
    </section>

    <footer class="app-footer">
      <div class="app-footer__attribution">
        <span>Data from Metra GTFS, redistributed per license · not affiliated with Metra</span>
      </div>

      <!-- Snehal.ai branding footer -->
      <div class="snehal-footer">
        <div class="snehal-footer__inner">
          <div class="snehal-footer__brand">
            <a class="snehal-footer__name" href="https://snehal.ai/" target="_blank" rel="noopener">Snehal Patel</a>
            <span class="snehal-footer__tagline">I love to build things ✨</span>
          </div>

          <div class="snehal-footer__social">
            <a href="https://github.com/spate141" target="_blank" rel="noopener" aria-label="GitHub">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M12 .5C5.73.5.5 5.73.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56 0-.28-.01-1.02-.02-2-3.2.7-3.88-1.54-3.88-1.54-.53-1.34-1.29-1.7-1.29-1.7-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.77 2.7 1.26 3.36.96.1-.75.4-1.26.73-1.55-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.29 1.19-3.09-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11 11 0 0 1 2.9-.39c.98 0 1.97.13 2.9.39 2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.76.11 3.05.74.8 1.19 1.83 1.19 3.09 0 4.42-2.69 5.39-5.25 5.68.41.36.78 1.05.78 2.12 0 1.53-.01 2.76-.01 3.14 0 .31.21.68.8.56A10.52 10.52 0 0 0 23.5 12C23.5 5.73 18.27.5 12 .5z"/></svg>
            </a>
            <a href="https://www.linkedin.com/in/spatel141" target="_blank" rel="noopener" aria-label="LinkedIn">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.13 1.45-2.13 2.94v5.67H9.35V9h3.41v1.56h.05c.48-.9 1.63-1.85 3.36-1.85 3.6 0 4.27 2.37 4.27 5.45v6.29zM5.34 7.43a2.06 2.06 0 1 1 0-4.13 2.06 2.06 0 0 1 0 4.13zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.8 0 0 .78 0 1.73v20.53C0 23.22.8 24 1.77 24h20.45c.98 0 1.78-.78 1.78-1.74V1.73C24 .78 23.2 0 22.22 0z"/></svg>
            </a>
            <a href="https://huggingface.co/spate141" target="_blank" rel="noopener" aria-label="Hugging Face">
              <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><text x="2" y="18" font-size="16">🤗</text></svg>
            </a>
          </div>
        </div>
      </div>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
