<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>metra-monitor — MD-W live</title>
    <meta name="description" content="Live MD-W commute status, map, and alerts." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div class="logo">
        <span class="logo-mark">🚆</span>
        <span class="logo-text">metra-monitor</span>
        <span class="line-badge" id="line-badge">MD-W</span>
      </div>
      <div class="meta">
        <span class="last-update" id="last-update">connecting…</span>
        <span class="refresh-dot" id="refresh-dot"></span>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </header>

    <div id="feed-banner" class="feed-banner" hidden>⚠️ Feed stale — showing last known data</div>

    <div id="alerts-ticker" class="alerts-ticker" hidden></div>

    <main class="layout">
      <section class="board" id="board">
        <div class="board-row" id="row-morning" data-slot="morning">
          <div class="board-row-label">Morning <span class="board-route">Roselle ▸ Chicago</span></div>
          <div class="board-row-body">Loading…</div>
        </div>
        <div class="board-row" id="row-evening" data-slot="evening">
          <div class="board-row-label">Evening <span class="board-route">Chicago ▸ Roselle</span></div>
          <div class="board-row-body">Loading…</div>
        </div>
      </section>

      <section class="map-pane">
        <div id="map"></div>
        <aside id="sheet" class="sheet" hidden>
          <button class="sheet-close" id="sheet-close" aria-label="Close">✕</button>
          <div id="sheet-content"></div>
        </aside>
      </section>
    </main>

    <section class="trend" id="trend">
      <div class="trend-title">30-day on-time performance</div>
      <div id="trend-body" class="trend-body">Loading…</div>
    </section>

    <footer>
      <span>Data from Metra GTFS, redistributed per license · not affiliated with Metra</span>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
