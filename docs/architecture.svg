<svg viewBox="0 0 1180 860" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <!-- Daylight background -->
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4f7fb"/>
      <stop offset="55%" stop-color="#eef2f8"/>
      <stop offset="100%" stop-color="#e6ecf4"/>
    </linearGradient>

    <!-- Node fills (light cards) -->
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#eef3fa"/>
    </linearGradient>
    <linearGradient id="cardGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#e6f6ea"/>
    </linearGradient>
    <linearGradient id="cardAmber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffbf0"/><stop offset="100%" stop-color="#fdf1d6"/>
    </linearGradient>
    <linearGradient id="cardStore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f0eafa"/>
    </linearGradient>

    <filter id="drop" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#5a6a80" flood-opacity="0.28"/>
    </filter>

    <!-- Signal light: three-aspect railway signal -->
    <g id="signal">
      <rect x="-9" y="-30" width="18" height="60" rx="5" fill="#2c3242" stroke="#1a1f2b" stroke-width="1.5"/>
      <circle cx="0" cy="-18" r="5.5" fill="#d6362d"/>
      <circle cx="0" cy="0" r="5.5" fill="#e0a020"/>
      <circle cx="0" cy="18" r="5.5" fill="#2ba45a"/>
    </g>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1180" height="860" fill="url(#night)"/>

  <!-- subtle track ties across bottom -->
  <g opacity="0.22">
    <line x1="0" y1="812" x2="1180" y2="812" stroke="#8a97a8" stroke-width="3"/>
    <line x1="0" y1="828" x2="1180" y2="828" stroke="#8a97a8" stroke-width="3"/>
    <g stroke="#a6b0be" stroke-width="6">
      <line x1="40" y1="806" x2="40" y2="834"/><line x1="120" y1="806" x2="120" y2="834"/>
      <line x1="200" y1="806" x2="200" y2="834"/><line x1="280" y1="806" x2="280" y2="834"/>
      <line x1="360" y1="806" x2="360" y2="834"/><line x1="440" y1="806" x2="440" y2="834"/>
      <line x1="520" y1="806" x2="520" y2="834"/><line x1="600" y1="806" x2="600" y2="834"/>
      <line x1="680" y1="806" x2="680" y2="834"/><line x1="760" y1="806" x2="760" y2="834"/>
      <line x1="840" y1="806" x2="840" y2="834"/><line x1="920" y1="806" x2="920" y2="834"/>
      <line x1="1000" y1="806" x2="1000" y2="834"/><line x1="1080" y1="806" x2="1080" y2="834"/>
      <line x1="1160" y1="806" x2="1160" y2="834"/>
    </g>
  </g>

  <!-- Title banner -->
  <g filter="url(#drop)">
    <rect x="392" y="22" width="396" height="62" rx="10" fill="#ffffff" stroke="#c8891a" stroke-width="2.5"/>
    <text x="590" y="50" text-anchor="middle" font-size="26" font-weight="800" fill="#1f2b3d" letter-spacing="0.5">metra-monitor</text>
    <text x="590" y="70" text-anchor="middle" font-size="12" font-weight="600" fill="#5a6b82">realtime commute alerts · adaptive polling · Telegram</text>
  </g>

  <!-- ===== EDGES: orthogonal routing (under nodes) ===== -->
  <g stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- GTFS static -> Ingest -->
    <path d="M180 214 L180 300 Q180 308 188 308 L300 308" stroke="#2ba45a"/>
    <!-- Ingest -> DB -->
    <path d="M300 330 L266 330 Q258 330 258 338 L258 430 Q258 438 266 438 L300 438" stroke="#3a6198"/>
    <!-- RT -> Poller -->
    <path d="M380 214 L380 300 Q380 308 388 308 L470 308 Q478 308 478 316 L478 388" stroke="#c8891a"/>
    <!-- Poller -> Loop -->
    <path d="M478 428 L478 470 Q478 478 486 478 L560 478 Q568 478 568 486 L568 520" stroke="#3a6198"/>
    <!-- Poller -> API -->
    <path d="M556 408 L740 408 Q748 408 748 416 L748 520" stroke="#3a6198"/>
    <!-- Loop -> Bot (delay/cancel/alert diffs, RED): drop below, run across under FastAPI, up into Bot -->
    <path d="M646 560 L654 560 Q662 560 662 568 L662 580 Q662 588 670 588 L922 588 Q930 588 930 596 L930 616" stroke="#d6362d"/>
    <!-- Loop -> DB (on-time observations) -->
    <path d="M568 548 L568 588 Q568 596 560 596 L322 596 Q314 596 314 588 L314 462" stroke="#2ba45a"/>
    <!-- DB -> API -->
    <path d="M400 438 L720 438 Q728 438 728 446 L728 520" stroke="#3a6198"/>
    <!-- DB -> Bot -->
    <path d="M400 452 L640 452 Q648 452 648 460 L648 626 Q648 634 656 634 L820 634" stroke="#3a6198"/>
    <!-- Sched -> Bot -->
    <path d="M890 428 L890 520 Q890 528 898 528 L905 528 L905 616" stroke="#c8891a"/>
    <!-- Bot <-> TG (bidirectional, in devices) -->
    <path d="M990 648 L1040 648 Q1048 648 1048 656 L1048 712" stroke="#6b7a90"/>
    <!-- API -> Tunnel -->
    <path d="M780 560 L1030 560 Q1038 560 1038 552 L1038 470" stroke="#3a6198"/>
    <!-- Tunnel -> Browser (fetch) -->
    <path d="M1038 426 L1038 690 Q1038 698 1030 698 L840 698 Q832 698 832 706 L832 712" stroke="#3a6198"/>
    <!-- Pages -> Browser (serves bundle) -->
    <path d="M780 742 L800 742" stroke="#6b7a90"/>
    <!-- Browser -> Tiles (map tiles) -->
    <path d="M800 748 L560 748 Q552 748 552 756 L552 792" stroke="#6b7a90"/>
  </g>

  <!-- Edge labels -->
  <g font-size="10.5" font-weight="700">
    <g><rect x="112" y="252" width="86" height="16" rx="4" fill="#dcf2e2" stroke="#8fd3a6" stroke-width="0.75"/><text x="155" y="264" text-anchor="middle" fill="#1c7a45">every 10 min</text></g>
    <g><rect x="352" y="252" width="46" height="16" rx="4" fill="#fbeecb" stroke="#e4c078" stroke-width="0.75"/><text x="375" y="264" text-anchor="middle" fill="#9a6708">poll</text></g>
    <g><rect x="654" y="586" width="132" height="16" rx="4" fill="#fbdcd9" stroke="#e89b95" stroke-width="0.75"/><text x="720" y="598" text-anchor="middle" fill="#b02a22">delay / cancel / alert diffs</text></g>
    <g><rect x="360" y="590" width="120" height="16" rx="4" fill="#dcf2e2" stroke="#8fd3a6" stroke-width="0.75"/><text x="420" y="602" text-anchor="middle" fill="#1c7a45">on-time observations</text></g>
    <g><rect x="742" y="470" width="180" height="16" rx="4" fill="#fbeecb" stroke="#e4c078" stroke-width="0.75"/><text x="832" y="482" text-anchor="middle" fill="#9a6708">MORNING / EVENING_BRIEFING</text></g>
    <g><rect x="452" y="676" width="196" height="16" rx="4" fill="#e6edf6" stroke="#b3c4da" stroke-width="0.75"/><text x="550" y="688" text-anchor="middle" fill="#3a5578">/next /morning /evening /train /stats</text></g>
    <g><rect x="828" y="572" width="98" height="16" rx="4" fill="#e6edf6" stroke="#b3c4da" stroke-width="0.75"/><text x="877" y="584" text-anchor="middle" fill="#3a5578">fetch /api/v1/*</text></g>
    <g><rect x="700" y="694" width="86" height="16" rx="4" fill="#e6edf6" stroke="#b3c4da" stroke-width="0.75"/><text x="743" y="706" text-anchor="middle" fill="#3a5578">static bundle</text></g>
    <g><rect x="480" y="768" width="66" height="16" rx="4" fill="#e6edf6" stroke="#b3c4da" stroke-width="0.75"/><text x="513" y="780" text-anchor="middle" fill="#3a5578">map tiles</text></g>
  </g>

  <!-- ===== CLUSTERS ===== -->
  <!-- Metra external -->
  <rect x="96" y="104" width="384" height="118" rx="12" fill="#2ba45a" fill-opacity="0.07" stroke="#2ba45a" stroke-width="1.5" stroke-dasharray="7 5"/>
  <use href="#signal" x="120" y="150" transform="scale(0.5)"/>
  <text x="132" y="128" font-size="12.5" font-weight="800" fill="#1c7a45">Metra · external public feeds</text>

  <!-- metra-monitor process -->
  <rect x="230" y="252" width="820" height="330" rx="14" fill="#3a6198" fill-opacity="0.06" stroke="#3a6198" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="250" y="282" font-size="12.5" font-weight="800" fill="#2c4a72">metra-monitor · one process (systemd)</text>

  <!-- Cloudflare -->
  <rect x="980" y="404" width="150" height="366" rx="12" fill="#c8891a" fill-opacity="0.08" stroke="#c8891a" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="1055" y="426" text-anchor="middle" font-size="12.5" font-weight="800" fill="#9a6708">Cloudflare</text>

  <!-- Your devices -->
  <rect x="700" y="612" width="440" height="180" rx="12" fill="#6b7a90" fill-opacity="0.08" stroke="#6b7a90" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="920" y="634" text-anchor="middle" font-size="12.5" font-weight="800" fill="#3a5578">Your devices</text>

  <!-- ===== NODES ===== -->
  <!-- GTFS static -->
  <g filter="url(#drop)">
    <rect x="110" y="168" width="140" height="46" rx="8" fill="url(#cardGreen)" stroke="#2ba45a" stroke-width="2"/>
    <text x="180" y="189" text-anchor="middle" font-size="12.5" font-weight="800" fill="#175c33">GTFS static</text>
    <text x="180" y="204" text-anchor="middle" font-size="9.5" fill="#2e8a52">schedule.zip</text>
  </g>
  <!-- GTFS realtime -->
  <g filter="url(#drop)">
    <rect x="300" y="168" width="160" height="46" rx="8" fill="url(#cardGreen)" stroke="#2ba45a" stroke-width="2"/>
    <text x="380" y="188" text-anchor="middle" font-size="12.5" font-weight="800" fill="#175c33">GTFS-realtime</text>
    <text x="380" y="204" text-anchor="middle" font-size="8.5" fill="#2e8a52">trip updates · positions · alerts</text>
  </g>

  <!-- Static ingestor -->
  <g filter="url(#drop)">
    <rect x="300" y="308" width="140" height="44" rx="8" fill="url(#card)" stroke="#3a6198" stroke-width="2"/>
    <text x="370" y="328" text-anchor="middle" font-size="12.5" font-weight="800" fill="#22344d">Static ingestor</text>
    <text x="370" y="343" text-anchor="middle" font-size="9.5" fill="#5a6b82">app/ingest</text>
  </g>
  <!-- SQLite DB (barrel) -->
  <g filter="url(#drop)">
    <ellipse cx="358" cy="422" rx="58" ry="10" fill="#e4d8f5" stroke="#7a52c0" stroke-width="2"/>
    <path d="M300 422 L300 452 A58 10 0 0 0 416 452 L416 422" fill="url(#cardStore)" stroke="#7a52c0" stroke-width="2"/>
    <ellipse cx="358" cy="422" rx="58" ry="10" fill="#f0eafa" stroke="#7a52c0" stroke-width="2"/>
    <text x="358" y="420" text-anchor="middle" font-size="12" font-weight="800" fill="#4a2f80">SQLite</text>
    <text x="358" y="446" text-anchor="middle" font-size="9" fill="#6b4aa8">metra.db</text>
  </g>
  <!-- Realtime poller -->
  <g filter="url(#drop)">
    <rect x="470" y="388" width="86" height="44" rx="8" fill="url(#card)" stroke="#3a6198" stroke-width="2"/>
    <text x="513" y="408" text-anchor="middle" font-size="12" font-weight="800" fill="#22344d">Poller</text>
    <text x="513" y="422" text-anchor="middle" font-size="8" fill="#5a6b82">realtime/poller.py</text>
  </g>
  <!-- Alert engine + loop -->
  <g filter="url(#drop)">
    <rect x="490" y="520" width="156" height="52" rx="8" fill="url(#cardAmber)" stroke="#c8891a" stroke-width="2"/>
    <text x="568" y="539" text-anchor="middle" font-size="12" font-weight="800" fill="#7a5208">Alert engine + loop</text>
    <text x="568" y="553" text-anchor="middle" font-size="8.5" fill="#9a6708">adaptive polling</text>
    <text x="568" y="565" text-anchor="middle" font-size="8" fill="#9a6708">app/realtime/loop.py</text>
  </g>
  <!-- APScheduler -->
  <g filter="url(#drop)">
    <rect x="820" y="384" width="140" height="44" rx="8" fill="url(#cardAmber)" stroke="#c8891a" stroke-width="2"/>
    <text x="890" y="404" text-anchor="middle" font-size="12" font-weight="800" fill="#7a5208">APScheduler</text>
    <text x="890" y="418" text-anchor="middle" font-size="8.5" fill="#9a6708">briefing cron jobs</text>
  </g>
  <!-- FastAPI -->
  <g filter="url(#drop)">
    <rect x="700" y="520" width="120" height="44" rx="8" fill="url(#card)" stroke="#3a6198" stroke-width="2"/>
    <text x="760" y="540" text-anchor="middle" font-size="12.5" font-weight="800" fill="#22344d">FastAPI</text>
    <text x="760" y="554" text-anchor="middle" font-size="8.5" fill="#5a6b82">/api/v1/* + /health</text>
  </g>
  <!-- Telegram bot -->
  <g filter="url(#drop)">
    <rect x="820" y="616" width="170" height="46" rx="8" fill="url(#card)" stroke="#3a6198" stroke-width="2"/>
    <text x="905" y="637" text-anchor="middle" font-size="12.5" font-weight="800" fill="#22344d">Telegram bot</text>
    <text x="905" y="652" text-anchor="middle" font-size="9" fill="#5a6b82">long-polling</text>
  </g>

  <!-- Cloudflare Tunnel -->
  <g filter="url(#drop)">
    <rect x="990" y="426" width="130" height="44" rx="8" fill="url(#cardAmber)" stroke="#c8891a" stroke-width="2"/>
    <text x="1055" y="446" text-anchor="middle" font-size="12" font-weight="800" fill="#7a5208">Tunnel</text>
    <text x="1055" y="460" text-anchor="middle" font-size="8" fill="#9a6708">metra-api.snehal.ai</text>
  </g>
  <!-- Cloudflare Pages -->
  <g filter="url(#drop)">
    <rect x="640" y="728" width="140" height="44" rx="8" fill="url(#cardAmber)" stroke="#c8891a" stroke-width="2"/>
    <text x="710" y="748" text-anchor="middle" font-size="12" font-weight="800" fill="#7a5208">Pages (static)</text>
    <text x="710" y="762" text-anchor="middle" font-size="8" fill="#9a6708">metra.snehal.ai</text>
  </g>

  <!-- Browser dashboard -->
  <g filter="url(#drop)">
    <rect x="800" y="712" width="160" height="48" rx="8" fill="url(#card)" stroke="#3a6198" stroke-width="2"/>
    <text x="880" y="732" text-anchor="middle" font-size="12.5" font-weight="800" fill="#22344d">Dashboard</text>
    <text x="880" y="748" text-anchor="middle" font-size="8.5" fill="#5a6b82">Vite + TS + MapLibre</text>
  </g>
  <!-- Telegram app -->
  <g filter="url(#drop)">
    <rect x="1000" y="712" width="120" height="48" rx="8" fill="url(#card)" stroke="#3a6198" stroke-width="2"/>
    <text x="1060" y="738" text-anchor="middle" font-size="12.5" font-weight="800" fill="#22344d">Telegram app</text>
  </g>

  <!-- OpenFreeMap tiles (external, sits at bottom) -->
  <g filter="url(#drop)">
    <rect x="482" y="792" width="140" height="44" rx="8" fill="url(#cardGreen)" stroke="#2ba45a" stroke-width="2"/>
    <text x="552" y="812" text-anchor="middle" font-size="12" font-weight="800" fill="#175c33">OpenFreeMap</text>
    <text x="552" y="826" text-anchor="middle" font-size="8.5" fill="#2e8a52">free vector tiles</text>
  </g>

  <!-- Legend + signal key -->
  <g transform="translate(96,612)" font-size="10.5" font-weight="700">
    <rect x="0" y="0" width="200" height="150" rx="10" fill="#ffffff" stroke="#c4d0de" stroke-width="1.5"/>
    <text x="14" y="22" font-size="11.5" font-weight="800" fill="#1f2b3d">Node types</text>
    <rect x="14" y="32" width="16" height="12" rx="3" fill="url(#cardGreen)" stroke="#2ba45a"/><text x="40" y="42" fill="#3a4a5e">external feed / service</text>
    <rect x="14" y="52" width="16" height="12" rx="3" fill="url(#card)" stroke="#3a6198"/><text x="40" y="62" fill="#3a4a5e">app component</text>
    <rect x="14" y="72" width="16" height="12" rx="3" fill="url(#cardAmber)" stroke="#c8891a"/><text x="40" y="82" fill="#3a4a5e">scheduler / edge</text>
    <rect x="14" y="92" width="16" height="12" rx="3" fill="url(#cardStore)" stroke="#7a52c0"/><text x="40" y="102" fill="#3a4a5e">storage</text>
    <text x="14" y="126" font-size="11.5" font-weight="800" fill="#1f2b3d">Signal aspects</text>
    <circle cx="22" cy="140" r="5" fill="#d6362d"/><text x="34" y="144" fill="#3a4a5e">alert</text>
    <circle cx="82" cy="140" r="5" fill="#e0a020"/><text x="94" y="144" fill="#3a4a5e">schedule</text>
    <circle cx="150" cy="140" r="5" fill="#2ba45a"/><text x="162" y="144" fill="#3a4a5e">clear</text>
  </g>
</svg>
